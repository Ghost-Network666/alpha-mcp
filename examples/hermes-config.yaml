# Example for ~/.hermes/config.yaml
mcp_servers:
  polymarket-alpha:
    command: python
    args: ["-m", "polymarket_alpha"]
    cwd: "C:\\Users\\<your-username>\\Desktop\\Alpha MCP"   # <-- Important: point to this folder
    env:
      POLYMARKET_PRIVATE_KEY: ${POLYMARKET_PRIVATE_KEY}
      # Gasless / Relayer (recommended) - completes Builder integration
      RELAYER_API_KEY: ${RELAYER_API_KEY}
      RELAYER_API_KEY_ADDRESS: ${RELAYER_API_KEY_ADDRESS}
      # Optional builder secrets for advanced signing
      RELAYER_API_SECRET: ${RELAYER_API_SECRET}
      RELAYER_API_PASSPHRASE: ${RELAYER_API_PASSPHRASE}
      # POLY_SIGNATURE_TYPE is optional - now defaults to 3 (Deposit wallets)
      # Only set explicitly if you need 1 (proxy) or 2 (Safe)
      POLY_SIGNATURE_TYPE: "3"
      BUILDER_CODE: ${BUILDER_CODE}
